{% extends 'base.html' %}

{% block content %}
<header>
    <h1>System Records</h1>
    <div>
        <button id="bulk-delete-btn" style="background:var(--danger-color); margin-right:1rem; display:none;">Delete Selected</button>
        <button id="add-student-btn" style="background:var(--success-color); margin-right:1rem;">Add New Student</button>
        <button id="export-csv-btn" style="margin-right:1rem; background: var(--primary-color);">Export CSV</button>
        <button id="import-btn">Import Dummy Data</button>
    </div>
</header>

<div style="margin-top: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>Student Enrollment List</h2>
    <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search by name or email..." class="search-bar">
        <button class="clear-search" id="clear-records-search">&times;</button>
    </div>
    </div>

    <table id="students-table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="select-all-cb"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Enrolled</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Populated via JS -->
        </tbody>
    </table>

    <div class="pagination">
        <button id="prev-btn" disabled>Previous</button>
        <span id="page-info">Page 1</span>
        <button id="next-btn" disabled>Next</button>
    </div>
</div>

<!-- Add Student Modal -->
<div id="add-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-modal">&times;</span>
        <h2 style="margin-bottom: 1.5rem;">New Enrollment</h2>
        <form id="add-student-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="form-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="form-email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="form-age" required min="10" max="100" placeholder="20">
            </div>
            <button type="submit" style="width: 100%; margin-top:1rem; padding: 1rem;">Register Student</button>
        </form>
    </div>
</div>

<!-- Edit Student Modal -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-edit-modal">&times;</span>
        <h2 style="margin-bottom: 1.5rem;">Edit Enrollment</h2>
        <form id="edit-student-form">
            <input type="hidden" id="edit-form-id">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-form-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="edit-form-email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="edit-form-age" required min="10" max="100" placeholder="20">
            </div>
            <button type="submit" style="width: 100%; margin-top:1rem; padding: 1rem;">Update Student</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Note: main.js handles the logic for loadStudents() and other record-related functions.
    // It is already included in base.html.
</script>
{% endblock %}
