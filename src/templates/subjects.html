{% extends 'base.html' %}

{% block content %}
<header>
    <h1>Subject Management</h1>
    <button id="add-subject-btn" style="background:var(--success-color);">Add Subject</button>
</header>

<div class="board" style="display: block; margin-top: 2rem;">
    <div id="subjects-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;">
        <!-- Filled by JS -->
    </div>
</div>

<!-- Add Modal -->
<div id="subject-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-subject-modal">&times;</span>
        <h2 style="margin-bottom: 1.5rem;">New Subject</h2>
        <form id="subject-form">
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subject-name" required placeholder="e.g., Data Structures">
            </div>
            <div class="form-group" id="dept-group" style="display:none;">
                <label>Department (Admin Only)</label>
                <input type="text" id="subject-dept" placeholder="e.g., Computer Science">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="subject-desc" rows="3" style="width:100%; padding:0.75rem; border-radius:4px; background:var(--bg-color); color:var(--text-primary); border:1px solid var(--border-color);"></textarea>
            </div>
            <button type="submit" style="width: 100%; margin-top:1rem; padding: 1rem;">Create Subject</button>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    // Check if user is admin to show dept field
    let userRole = "{{ current_user.role }}";
    if (userRole === 'admin') {
        document.getElementById('dept-group').style.display = 'block';
    }

    async function loadSubjects() {
        showLoader();
        try {
            const res = await fetch('/api/subjects');
            const subjects = await res.json();
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';

            if (subjects.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; color: var(--text-secondary); text-align: center;">No subjects defined yet for your department.</p>';
                return;
            }

            subjects.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom:0.5rem;">
                        <h3 style="color:var(--primary-color); font-size:1.1rem; text-transform:none;">${s.name}</h3>
                        <button onclick="deleteSubject('${s.subject_id}')" style="background:transparent; color:var(--danger-color); padding:0; font-size:1.2rem;" title="Delete">&times;</button>
                    </div>
                    <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:0.5rem;">${s.description || 'No description provided.'}</p>
                    <small style="color:var(--text-secondary); opacity:0.7;">Dept: ${s.department || 'General'}</small>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            console.error(e);
        } finally {
            hideLoader();
        }
    }

    const subjectModal = document.getElementById('subject-modal');
    document.getElementById('add-subject-btn').addEventListener('click', () => subjectModal.classList.add('active'));
    document.getElementById('close-subject-modal').addEventListener('click', () => subjectModal.classList.remove('active'));

    document.getElementById('subject-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        showLoader();
        try {
            const res = await fetch('/api/subjects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('subject-name').value,
                    description: document.getElementById('subject-desc').value,
                    department: document.getElementById('subject-dept').value
                })
            });
            
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || "Failed to create subject");
                return;
            }

            subjectModal.classList.remove('active');
            document.getElementById('subject-form').reset();
            loadSubjects();
        } catch (e) {
            console.error(e);
            alert("An error occurred. Check console for details.");
        } finally {
            hideLoader();
        }
    });

    async function deleteSubject(id) {
        if (!confirm("Delete this subject? This won't remove existing grades but will prevent assigning it in the future.")) return;
        showLoader();
        try {
            await fetch(`/api/subjects/${id}`, { method: 'DELETE' });
            loadSubjects();
        } catch (e) {
            console.error(e);
        } finally {
            hideLoader();
        }
    }

    document.addEventListener('DOMContentLoaded', loadSubjects);
</script>
{% endblock %}
