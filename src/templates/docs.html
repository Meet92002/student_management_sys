<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite SMS Documentation</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            max-width: 900px; 
            margin: 0 auto; 
            color: #333; 
            line-height: 1.6;
        }
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin: 20px 0; 
            font-size: 0.95rem;
        }
        th, td { 
            border: 1px solid #e0e0e0; 
            padding: 12px 15px; 
            text-align: left; 
        }
        th { 
            background-color: #f8f9fa; 
            font-weight: 600;
        }
        h1 { color: #000; border-bottom: 2px solid #000; padding-bottom: 10px; }
        h2 { color: #222; margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 8px;}
        h3 { color: #444; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre code { display: block; padding: 15px; background: #282c34; color: #abb2bf; border-radius: 8px; overflow-x: auto;}
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-print { 
            background: #000; 
            color: #fff; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-print:hover { background: #333; }
        .btn-back {
            color: #666;
            text-decoration: none;
        }
        
        @media print { 
            .header-actions { display: none; } 
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="header-actions">
        <a href="{{ url_for('login') }}" class="btn-back">← Back to Login</a>
        <button class="btn-print" onclick="window.print()">Download PDF</button>
    </div>
    
    <div id="content">Loading documentation...</div>
    
    <script>
        fetch('/api/docs/content')
            .then(res => res.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "Error loading documentation. Please try again.";
            });
    </script>
</body>
</html>
